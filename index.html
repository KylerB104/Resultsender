<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FEC Election Night Desk</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #0b1220;
  color: white;
  margin: 0;
}

header {
  padding: 20px;
  background: #111a2e;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 10px;
}

.card {
  background: #121c33;
  padding: 10px;
  border-radius: 10px;
}

input {
  width: 60px;
}

button {
  background: #1f6feb;
  border: none;
  padding: 8px;
  color: white;
  cursor: pointer;
  border-radius: 6px;
}

textarea {
  width: 100%;
  height: 220px;
  background: #0a1020;
  color: #0f0;
}
</style>
</head>

<body>

<header>🗳️ F.E.C. Election Night Desk</header>

<div class="container">

<!-- GOVERNOR -->
<div class="card">
<h3>Governor Races</h3>

<div>
Franklin: JFK vs Kefauver<br>
<input id="gov_f1" value="58"> / <input id="gov_f2" value="42"><br><br>

Lincoln: Dole vs Bradley<br>
<input id="gov_l1" value="51"> / <input id="gov_l2" value="49"><br><br>

Dixieland: Carter vs Patton<br>
<input id="gov_d1" value="53.9"> / <input id="gov_d2" value="46.1"><br>
</div>

</div>

<!-- SENATE -->
<div class="card">
<h3>Senate Races</h3>

Franklin: R vs D<br>
<input id="sen_f1" value="50.3"> / <input id="sen_f2" value="49.7"><br><br>

Sierra: R vs D<br>
<input id="sen_s1" value="85.6"> / <input id="sen_s2" value="14.4"><br><br>

Dixieland: D vs R<br>
<input id="sen_d1" value="91.2"> / <input id="sen_d2" value="8.8"><br><br>

Lincoln: D vs R<br>
<input id="sen_l1" value="85.5"> / <input id="sen_l2" value="14.5"><br><br>

Amarillo: R vs D<br>
<input id="sen_a1" value="55.1"> / <input id="sen_a2" value="44.9"><br>

</div>

</div>

<!-- HOUSE -->
<div class="card" style="margin:10px;">
<h3>House (Quick Control Toggle)</h3>
<button onclick="loadFinal()">Load Final Results</button>
<button onclick="calc()">Recalculate Live</button>
</div>

<!-- OUTPUT -->
<div class="card" style="margin:10px;">
<h3>FEC Output Generator</h3>
<button onclick="generate()">Generate Report</button>
<textarea id="output"></textarea>
</div>

<script>

function win(a,b){ return a>b ? "A" : "B"; }

function generate(){

let govF = document.getElementById("gov_f1").value;
let govF2 = document.getElementById("gov_f2").value;
let govL = document.getElementById("gov_l1").value;
let govL2 = document.getElementById("gov_l2").value;
let govD = document.getElementById("gov_d1").value;
let govD2 = document.getElementById("gov_d2").value;

let text = "";

text += "FEC: # GOVERNOR OF COMMONWEALTH\n";
text += "JFK (D): " + govF + "%\n";
text += "Kefauver (R): " + govF2 + "%\n\n";

text += "Dole (R): " + govL + "%\n";
text += "Bradley (I/D): " + govL2 + "%\n\n";

text += "Carter (D): " + govD + "%\n";
text += "Patton (R): " + govD2 + "%\n\n";

text += "*** FEC OFFICIAL RESULTS ***";

document.getElementById("output").value = text;
}

function loadFinal(){

document.getElementById("gov_f1").value = 58;
document.getElementById("gov_f2").value = 42;

document.getElementById("gov_l1").value = 51;
document.getElementById("gov_l2").value = 49;

document.getElementById("gov_d1").value = 53.9;
document.getElementById("gov_d2").value = 46.1;

alert("Final results loaded.");
}

function calc(){
alert("Live recalculation mode is basic in this build — but flip logic is ready for expansion.");
}

</script>

</body>
</html>
