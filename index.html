<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FEC Election Desk v2</title>

<style>
body {
  font-family: Arial;
  background: #0b1220;
  color: white;
}

header {
  padding: 18px;
  background: #111a2e;
  font-size: 20px;
  text-align: center;
}

.card {
  background: #121c33;
  margin: 10px;
  padding: 12px;
  border-radius: 10px;
}

select, input[type=range] {
  width: 100%;
}

.output {
  width: 100%;
  height: 260px;
  background: black;
  color: #00ff88;
}
button {
  padding: 8px;
  background: #1f6feb;
  border: none;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>🗳️ F.E.C. LIVE ELECTION DESK</header>

<!-- RACE SELECT -->
<div class="card">
<h3>Select Race</h3>
<select id="race" onchange="loadRace()"></select>
</div>

<!-- SLIDER -->
<div class="card">
<h3>% COUNTED</h3>
<input type="range" min="0" max="100" value="0" id="counted" oninput="update()">
<div id="countLabel">0%</div>
</div>

<!-- RESULTS -->
<div class="card">
<h3>LIVE RESULT</h3>
<div id="display"></div>
</div>

<!-- OUTPUT -->
<div class="card">
<h3>FEC OUTPUT</h3>
<button onclick="generate()">Generate Official Report</button>
<textarea id="out" class="output"></textarea>
</div>

<script>

const races = {

"COMMONWEALTH OF FRANKLIN - GOVERNOR": {
region:"FRANKLIN",
type:"GOV",
candidates:[
{name:"John F. Kennedy", party:"DEM", base:58},
{name:"Estes Kefauver", party:"REP", base:42}
]
},

"COMMONWEALTH OF LINCOLN - GOVERNOR": {
region:"LINCOLN",
type:"GOV",
candidates:[
{name:"Robert Dole", party:"REP", base:51},
{name:"Omar Bradley", party:"IND", base:49}
]
},

"COMMONWEALTH OF DIXIELAND - GOVERNOR": {
region:"DIXIELAND",
type:"GOV",
candidates:[
{name:"Jimmy Carter", party:"DEM", base:53.9},
{name:"George Patton", party:"REP", base:46.1}
]
}

};

function init(){
let sel = document.getElementById("race");
for(let r in races){
let opt = document.createElement("option");
opt.value = r;
opt.innerText = r;
sel.appendChild(opt);
}
loadRace();
}

function loadRace(){
update();
}

function update(){

let race = races[document.getElementById("race").value];
let pct = document.getElementById("counted").value;

document.getElementById("countLabel").innerText = pct + "%";

let shift = (100 - pct) / 20;

let html = "";

race.candidates.forEach(c => {
let adj = c.base + (Math.random()*shift - shift/2);
html += `<b>${c.name} (${c.party})</b> - ${adj.toFixed(1)}%<br>`;
});

document.getElementById("display").innerHTML = html;
}

function generate(){

let race = document.getElementById("race").value;
let pct = document.getElementById("counted").value;
let display = document.getElementById("display").innerText;

let text =
`FEC: # ${race}
${display}
**__Est % in:__** ${pct}%

***<:FEC:1424668953493504070> | Official F.E.C. Results***`;

document.getElementById("out").value = text;
}

init();

</script>

</body>
</html>
